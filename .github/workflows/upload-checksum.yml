name: Attach Checksum to Existing Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'The YYYYMMDD release tag to update'
        required: true
        type: string

permissions:
  contents: write

jobs:
  append-asset:
    runs-on: ubuntu-latest
    steps:
      # 1. Download using your explicit repository target
      - name: Download ZIP from the Release
        run: gh release download "${{ inputs.tag_name }}" --pattern "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }} # Tells gh which repository to target
          
      # 2. Checksum whatever ZIP file was downloaded
      - name: Generate MD5 Checksum
        run: md5sum *.zip > checksum.txt

      # 3. Upload using your explicit repository target
      - name: Upload Checksum via GitHub CLI
        run: gh release upload "${{ inputs.tag_name }}" checksum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }} # Tells gh which repository to target

## How to run it manually for your existing tag:

### 1. Commit the workflow file directly to your default branch (usually main).
### 2. Go to your repository on GitHub.com and click the Actions tab.
### 3. Select "Attach Checksum to Existing Release" from the left sidebar.
### 4. Click the Run workflow dropdown on the right.
### 5. Leave "Use workflow from" set to Branch: main (this clears the orange error).
### 6. In the new "The YYYYMMDD release tag to update" text box, type your tag (e.g., 20200927).
### 7. Click the green Run workflow button.
